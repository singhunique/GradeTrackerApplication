services:
  - type: web
    name: contribution-tracker
    env: node
    plan: free
    buildCommand: npm install && cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: MONGO_URI
        sync: false # You will set this manually in Render Dashboard
      - key: JWT_SECRET
        generateValue: true